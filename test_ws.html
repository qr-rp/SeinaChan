<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes WebSocket 连接测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 16px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4a90d9;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row input { flex: 1; }
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-primary { background: #4a90d9; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .actions { display: flex; gap: 10px; margin-top: 8px; }
        #log {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 16px;
            border-radius: 8px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-time { color: #858585; }
        .log-info { color: #4fc1ff; }
        .log-success { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-warn { color: #dcdcaa; }
        .log-send { color: #c586c0; }
        .log-recv { color: #ce9178; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-disconnected { background: #eee; color: #666; }
        .status-connecting { background: #fff3cd; color: #856404; }
        .status-connected { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Hermes WebSocket 连接测试</h1>

    <div class="card">
        <label>WebSocket 地址</label>
        <input type="text" id="wsUrl" value="ws://127.0.0.1:9119/api/ws" placeholder="ws://host:port/api/ws">

        <div class="row">
            <div style="flex:1">
                <label>Token</label>
                <input type="text" id="token" value="placeholder_token" placeholder="留空则不带token">
            </div>
            <div style="flex:1">
                <label>连接超时 (秒)</label>
                <input type="text" id="timeout" value="10">
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="connect()">连接</button>
            <button class="btn-danger" onclick="disconnect()">断开</button>
            <button class="btn-secondary" onclick="clearLog()">清空日志</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex;align-items:center;margin-bottom:12px;">
            <strong>连接状态</strong>
            <span id="statusBadge" class="status status-disconnected">未连接</span>
        </div>
        <div id="log"></div>
    </div>

    <div class="card">
        <strong>发送消息测试</strong>
        <div style="display:flex;gap:10px;margin-top:12px;">
            <input type="text" id="message" value='{"jsonrpc":"2.0","id":1,"method":"session.list"}' style="flex:1;margin-bottom:0;">
            <button class="btn-primary" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let ws = null;
        const logEl = document.getElementById('log');
        const statusBadge = document.getElementById('statusBadge');

        function now() {
            const d = new Date();
            return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
        }

        function appendLog(cls, text) {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = text;
            const line = document.createElement('div');
            const time = document.createElement('span');
            time.className = 'log-time';
            time.textContent = `[${now()}] `;
            line.appendChild(time);
            line.appendChild(span);
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(state, text) {
            statusBadge.textContent = text;
            statusBadge.className = 'status status-' + state;
        }

        function clearLog() {
            logEl.innerHTML = '';
        }

        function connect() {
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
                appendLog('log-warn', '已经有一个连接正在进行或已建立，请先断开');
                return;
            }

            const baseUrl = document.getElementById('wsUrl').value.trim();
            const token = document.getElementById('token').value.trim();

            if (!baseUrl) {
                appendLog('log-error', '请输入 WebSocket 地址');
                return;
            }

            let url = baseUrl;
            if (!url.endsWith('/api/ws')) {
                url = url.replace(/\/$/, '') + '/api/ws';
                appendLog('log-warn', '地址未以 /api/ws 结尾，已自动补全为: ' + url);
            }

            if (token) {
                url += (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token);
            }

            appendLog('log-info', '正在连接: ' + url);
            setStatus('connecting', '连接中...');

            const timeoutSec = parseInt(document.getElementById('timeout').value) || 10;
            let connected = false;
            const timeoutId = setTimeout(() => {
                if (!connected) {
                    appendLog('log-error', `连接超时 (${timeoutSec}秒)`);
                    setStatus('error', '超时');
                    if (ws) {
                        ws.close();
                        ws = null;
                    }
                }
            }, timeoutSec * 1000);

            try {
                ws = new WebSocket(url);
            } catch (e) {
                clearTimeout(timeoutId);
                appendLog('log-error', '创建 WebSocket 失败: ' + e.message);
                setStatus('error', '错误');
                return;
            }

            ws.onopen = () => {
                clearTimeout(timeoutId);
                connected = true;
                appendLog('log-success', 'WebSocket 连接已建立 (onopen)');
                setStatus('connected', '已连接');
            };

            ws.onmessage = (event) => {
                appendLog('log-recv', '收到: ' + event.data.substring(0, 500) + (event.data.length > 500 ? '...' : ''));
            };

            ws.onerror = (event) => {
                clearTimeout(timeoutId);
                appendLog('log-error', 'WebSocket 错误 (onerror)');
                setStatus('error', '错误');
            };

            ws.onclose = (event) => {
                clearTimeout(timeoutId);
                connected = false;
                const reason = event.reason ? ` (${event.reason})` : '';
                const codeInfo = event.code === 1000 ? '正常关闭' :
                                 event.code === 1006 ? '异常关闭(连接意外中断)' :
                                 `code=${event.code}`;
                appendLog('log-warn', `WebSocket 已关闭: ${codeInfo}${reason}`);
                if (ws.readyState !== WebSocket.OPEN) {
                    setStatus('disconnected', '未连接');
                }
                ws = null;
            };
        }

        function disconnect() {
            if (!ws) {
                appendLog('log-warn', '当前没有连接');
                return;
            }
            appendLog('log-info', '正在手动断开连接...');
            ws.close(1000, '用户手动断开');
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                appendLog('log-error', 'WebSocket 未连接，无法发送');
                return;
            }
            const msg = document.getElementById('message').value;
            try {
                JSON.parse(msg);
            } catch (e) {
                appendLog('log-warn', '消息不是合法 JSON，但仍会发送');
            }
            ws.send(msg);
            appendLog('log-send', '发送: ' + msg.substring(0, 500) + (msg.length > 500 ? '...' : ''));
        }
    </script>
</body>
</html>
